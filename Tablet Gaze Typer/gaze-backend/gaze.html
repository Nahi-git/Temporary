<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <script src="https://cdn.jsdelivr.net/npm/webgazer@latest/dist/webgazer.js"></script>
</head>
<body style="margin:0;background:black">

<script>
const socket = new WebSocket("ws://localhost:8765");
let latest = null;

webgazer
  .setRegression("ridge")
  .setGazeListener(function(data) {
    if (data && data.x !== null && data.y !== null) {
      latest = { x: data.x, y: data.y };
      console.log('Gaze data:', latest); //debug log
    }
  })
  .begin()
  .then(function() {
    console.log('WebGazer initialized');
    webgazer.showFaceFeedbackBox(true);
  })
  .catch(function(err) {
    console.error('WebGazer error:', err);
  });

//send window size once when connected
socket.onopen = () => {
  socket.send(JSON.stringify({ 
    type: "windowSize", 
    width: window.innerWidth, 
    height: window.innerHeight 
  }));
  console.log('WebSocket connected');
};

setInterval(() => {
  if (latest && socket.readyState === 1) {
    socket.send(JSON.stringify(latest));
  }
}, 33);

document.body.onclick = e => {
  webgazer.recordScreenPosition(e.clientX, e.clientY, "click");
  console.log('Calibration point recorded:', e.clientX, e.clientY);
};
</script>

</body>
</html>
