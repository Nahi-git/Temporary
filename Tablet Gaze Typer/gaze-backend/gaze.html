<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>WebGazer Calibration</title>

  <script src="https://webgazer.cs.brown.edu/webgazer.js"></script>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: black;
      overflow: hidden;
    }

    #calibrationDot {
      position: fixed;
      width: 24px;
      height: 24px;
      background: red;
      border-radius: 50%;
      z-index: 9999;
      display: block;
    }

    #instructions {
      position: fixed;
      top: 20px;
      width: 100%;
      text-align: center;
      color: white;
      font-family: sans-serif;
      font-size: 18px;
      z-index: 9999;
    }
  </style>
</head>

<body>

<div id="instructions">
  Look at the red dot and click to calibrate
</div>

<div id="calibrationDot"></div>

<script>
window.onload = () => {
  const socket = new WebSocket("ws://localhost:8765");
  const margin = 120;
  const points = [
    [margin, margin],
    [window.innerWidth / 2, margin],
    [window.innerWidth - margin, margin],

    [margin, window.innerHeight / 2],
    [window.innerWidth / 2, window.innerHeight / 2],
    [window.innerWidth - margin, window.innerHeight / 2],

    [margin, window.innerHeight - margin],
    [window.innerWidth / 2, window.innerHeight - margin],
    [window.innerWidth - margin, window.innerHeight - margin]
  ];

  let index = 0;
  let latestGaze = null;

  const dot = document.getElementById("calibrationDot");
  const instructions = document.getElementById("instructions");

  function showPoint() {
    const [x, y] = points[index];
    dot.style.left = (x - 12) + "px";
    dot.style.top  = (y - 12) + "px";
    dot.style.display = "block";
  }

  webgazer
    .setRegression("ridge")
    .setGazeListener(data => {
      if (data) {
        latestGaze = { x: data.x, y: data.y };
      }
    })
    .begin();

  webgazer.showFaceFeedbackBox(true);

  document.body.addEventListener("click", () => {
    if (index < points.length) {
      const [x, y] = points[index];
      webgazer.recordScreenPosition(x, y, "click");

      index++;

      if (index < points.length) {
        showPoint();
      } else {
        dot.style.display = "none";
        instructions.innerText = "Calibration complete. Gaze tracking active.";
      }
    }
  });

  showPoint();

  setInterval(() => {
    if (latestGaze && socket.readyState === 1) {
      socket.send(JSON.stringify(latestGaze));
    }
  }, 33);
};
</script>

</body>
</html>
